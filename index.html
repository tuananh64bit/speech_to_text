<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ứng dụng nhận diện giọng nói realtime và dịch song ngữ sang tiếng Việt. Hỗ trợ Tiếng Anh, Tiếng Hàn, Tiếng Trung." />
  <title>VoiceScribe — Nhận Diện Giọng Nói Song Ngữ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <div class="logo">
          <div class="logo-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </div>
          <h1>VoiceScribe</h1>
        </div>
        <span class="header-tagline">Nhận diện giọng nói song ngữ</span>
      </div>
      <div class="header-right">
        <div class="status-indicator" id="statusIndicator">
          <span class="status-dot"></span>
          <span class="status-text">Sẵn sàng</span>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main id="mainContent">
      <!-- Control Panel -->
      <section id="controlPanel" class="glass-panel">
        <!-- API Key (hidden - configured via .env) -->
        <div class="control-row" id="apiKeyRow" style="display: none;">
          <div class="control-group" style="flex: 1;">
            <label class="control-label">🔑 Deepgram API Key <a href="https://console.deepgram.com/signup" target="_blank" style="color: var(--accent-primary-light); text-decoration: none; font-weight: 400;">(Đăng ký miễn phí $200)</a></label>
            <div style="display: flex; gap: 8px;">
              <input type="password" id="apiKeyInput" class="api-key-input" placeholder="Dán API Key tại đây..." autocomplete="off" />
              <button class="btn btn-secondary btn-sm" id="btnSaveKey">Lưu</button>
            </div>
          </div>
        </div>

        <div class="control-row">
          <!-- Language Selector -->
          <div class="control-group">
            <label class="control-label">Ngôn ngữ nguồn</label>
            <div class="language-selector" id="languageSelector">
              <button class="lang-btn active" data-lang="en-US" id="langBtnEn">
                <span class="lang-flag">🇺🇸</span>
                <span class="lang-name">English</span>
              </button>
              <button class="lang-btn" data-lang="ko-KR" id="langBtnKo">
                <span class="lang-flag">🇰🇷</span>
                <span class="lang-name">한국어</span>
              </button>
              <button class="lang-btn" data-lang="zh-CN" id="langBtnZh">
                <span class="lang-flag">🇨🇳</span>
                <span class="lang-name">中文</span>
              </button>
            </div>
          </div>

          <!-- Target Language (fixed) -->
          <div class="control-group">
            <label class="control-label">Dịch sang</label>
            <div class="target-lang">
              <span class="lang-flag">🇻🇳</span>
              <span class="lang-name">Tiếng Việt</span>
            </div>
          </div>
        </div>

        <div class="control-row control-actions">
          <!-- Main Action Buttons -->
          <button class="btn btn-primary btn-record" id="btnRecord">
            <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
            <span>Bắt đầu</span>
          </button>

          <button class="btn btn-secondary" id="btnPause" disabled>
            <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="4" width="4" height="16"/>
              <rect x="14" y="4" width="4" height="16"/>
            </svg>
            <span>Tạm dừng</span>
          </button>

          <button class="btn btn-danger" id="btnStop" disabled>
            <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="6" width="12" height="12" rx="2"/>
            </svg>
            <span>Dừng</span>
          </button>

          <!-- Recording Timer -->
          <div class="recording-timer" id="recordingTimer">
            <div class="timer-dot"></div>
            <span class="timer-text" id="timerText">00:00</span>
          </div>

          <!-- Waveform Visualizer -->
          <div class="waveform-container" id="waveformContainer">
            <canvas id="waveformCanvas" width="200" height="40"></canvas>
          </div>
        </div>
      </section>

      <!-- Transcript Area -->
      <section id="transcriptSection" class="glass-panel">
        <div class="section-header">
          <h2>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
            Bản ghi song ngữ
          </h2>
          <div class="section-actions">
            <button class="btn btn-ghost btn-sm" id="btnClearTranscript" title="Xóa bản ghi">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              </svg>
            </button>
            <button class="btn btn-ghost btn-sm" id="btnExport" title="Xuất bản ghi">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="transcript-list" id="transcriptList">
          <!-- Empty state -->
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
              </svg>
            </div>
            <p class="empty-title">Nhấn "Bắt đầu" để ghi âm</p>
            <p class="empty-subtitle">Chọn ngôn ngữ nguồn và bắt đầu nói. Bản ghi song ngữ sẽ hiển thị tại đây.</p>
          </div>

          <!-- Interim text (currently being spoken) -->
          <div class="interim-segment" id="interimSegment" style="display: none;">
            <div class="segment-meta">
              <span class="segment-time">--:--</span>
              <span class="segment-badge interim-badge">Đang nghe...</span>
            </div>
            <div class="segment-content">
              <p class="segment-original interim-text" id="interimText"></p>
            </div>
          </div>
        </div>
      </section>

      <!-- Playback Section -->
      <section id="playbackSection" class="glass-panel" style="display: none;">
        <div class="section-header">
          <h2>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            Phát lại
          </h2>
          <div class="section-actions">
            <button class="btn btn-ghost btn-sm" id="btnDownloadAudio" title="Tải file ghi âm">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              <span>Tải audio</span>
            </button>
          </div>
        </div>

        <!-- Audio Player -->
        <div class="audio-player" id="audioPlayer">
          <audio id="audioElement"></audio>

          <div class="player-controls">
            <button class="btn btn-icon player-play" id="btnPlay">
              <svg class="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <polygon points="5 3 19 12 5 21 5 3"/>
              </svg>
              <svg class="icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                <rect x="6" y="4" width="4" height="16"/>
                <rect x="14" y="4" width="4" height="16"/>
              </svg>
            </button>

            <div class="player-progress">
              <span class="player-time" id="playerCurrentTime">0:00</span>
              <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
                <div class="progress-handle" id="progressHandle"></div>
              </div>
              <span class="player-time" id="playerDuration">0:00</span>
            </div>

            <div class="player-speed">
              <select id="playbackSpeed" class="speed-select">
                <option value="0.5">0.5x</option>
                <option value="0.75">0.75x</option>
                <option value="1" selected>1x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2x</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Subtitle Display -->
        <div class="subtitle-display" id="subtitleDisplay">
          <div class="subtitle-list" id="subtitleList">
            <!-- Subtitle segments will be rendered here -->
          </div>
        </div>
      </section>
    </main>

    <!-- Toast Notification -->
    <div class="toast-container" id="toastContainer"></div>
  </div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
